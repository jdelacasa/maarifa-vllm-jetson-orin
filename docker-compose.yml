services:


  vllm:
    image: jdelacasa/vllm-jetson:0.19.1-torch2.10.0-cu126-l4tr36.4-sm87
    runtime: nvidia
    restart: unless-stopped
    stop_grace_period: 120s
    profiles: [agents]
    ports:
      - "8001:8001"
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/data/huggingface
      - vllm-agents-compile-cache:/data/vllm-cache
      - ./docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_ENABLE_FUSED_MOE_ACTIVATION_CHUNKING=0
      - PIP_INSTALL=triton torchvision --no-deps
    command: >
      palmfuture/Qwen3.6-35B-A3B-GPTQ-Int4
      --host 0.0.0.0
      --port 8001
      --dtype half
      --gpu-memory-utilization 0.70
      --max-model-len 44000
      --max-num-batched-tokens 44000
      --max-num-seqs 4
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --reasoning-parser qwen3
      --no-enable-log-requests
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  vllm-compile-cache:
  vllm-agents-compile-cache:


