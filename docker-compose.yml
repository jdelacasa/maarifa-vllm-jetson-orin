services:

  vllm:
    image: vllm-jetson:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VLLM_REPO: https://github.com/vllm-project/vllm.git
        VLLM_BRANCH: v0.17.0
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/data/huggingface
      - vllm-compile-cache:/data/vllm-cache
      - ./docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_ENABLE_FUSED_MOE_ACTIVATION_CHUNKING=0
      - PIP_INSTALL=triton
    command: >
      ${MODEL:-Qwen/Qwen3.5-35B-A3B-GPTQ-Int4}
      --host 0.0.0.0
      --port 8000
      --dtype half
      --gpu-memory-utilization 0.55
      --max-model-len 44000
      --max-num-batched-tokens 44000
      --max-num-seqs 1
      --no-enable-log-requests
    #--quantization gptq_marlin
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  vllm-compile-cache:
